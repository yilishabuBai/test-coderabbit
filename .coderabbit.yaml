# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

language: "zh-CN"
tone_instructions: "请用专业但友好的语气进行审查，对每个问题给出具体的修复建议和代码示例。"
early_access: true
enable_free_tier: true

reviews:
  profile: "assertive"
  request_changes_workflow: true
  high_level_summary: true
  high_level_summary_placeholder: "@coderabbitai summary"
  high_level_summary_in_walkthrough: true
  auto_title_placeholder: "@coderabbitai"
  review_status: true
  review_details: true
  commit_status: true
  fail_commit_status: true
  collapse_walkthrough: false
  changed_files_summary: true
  sequence_diagrams: true
  assess_linked_issues: true
  related_issues: true
  related_prs: true
  suggested_labels: true
  auto_apply_labels: true
  suggested_reviewers: true
  poem: true
  abort_on_close: true

  labeling_instructions:
    - label: "bug"
      instructions: "当 PR 包含 bug 修复时应用此标签"
    - label: "security"
      instructions: "当 PR 涉及安全相关更改（如漏洞修复、密钥处理、输入验证等）时应用此标签"
    - label: "performance"
      instructions: "当 PR 包含性能优化或修复性能问题时应用此标签"
    - label: "refactor"
      instructions: "当 PR 主要是代码重构而非新功能时应用此标签"
    - label: "test"
      instructions: "当 PR 添加或修改测试代码时应用此标签"
    - label: "docs"
      instructions: "当 PR 包含文档更新时应用此标签"
    - label: "breaking-change"
      instructions: "当 PR 包含不向后兼容的更改时应用此标签"

  path_instructions:
    - path: "src/01-bugs/**"
      instructions: >
        重点检查：空指针引用、off-by-one 错误、竞态条件、逻辑错误、
        资源泄漏、异常吞没、无限循环等常见 bug。对每个发现的问题
        给出严重等级（critical/major/minor）和修复建议。
    - path: "src/02-security/**"
      instructions: >
        以 OWASP Top 10 为基准进行安全审查。重点检查：硬编码密钥、
        SQL 注入、XSS、命令注入、路径遍历、原型污染、不安全的随机数、
        SSRF 等安全漏洞。对每个漏洞标注 CVE 或 CWE 编号（如适用）。
    - path: "src/03-performance/**"
      instructions: >
        重点分析算法复杂度、内存泄漏、同步阻塞、重复计算、不必要的
        大对象拷贝、低效的字符串操作等性能问题。给出时间/空间复杂度
        分析和优化建议。
    - path: "src/04-js-traps/**"
      instructions: >
        重点检查 JavaScript 动态类型特有的陷阱：隐式类型转换、typeof
        怪异行为、this 指向问题、闭包变量捕获、parseInt 基数遗漏、
        数组方法误用、对象作为 Map 键等问题。
    - path: "src/05-best-practices/**"
      instructions: >
        对照业界最佳实践进行审查：命名规范、magic number、函数长度、
        嵌套深度、代码重复、未使用变量、回调地狱、var vs let/const 等。
        给出具体的重构建议。
    - path: "src/06-edge-cases/**"
      instructions: >
        检查边界情况处理：ReDoS 风险的正则表达式、过多的条件分支、
        Unicode/多语言字符串处理、时区和日期陷阱、浮点数精度问题等。
    - path: "src/07-good-code/**"
      instructions: >
        这是对照组，代码质量应该很高。仅报告真正的问题，避免误报。
        如果代码确实很好，请明确说明。
    - path: "scripts/**"
      instructions: "检查 shell 脚本的安全性和健壮性，确保 ShellCheck 规则得到遵循。"
    - path: "Dockerfile"
      instructions: "检查 Dockerfile 最佳实践，确保 Hadolint 规则得到遵循。"
    - path: "docs/**"
      instructions: "检查 Markdown 格式规范性，确保链接有效性和内容一致性。"

  auto_review:
    enabled: true
    incremental: true
    auto_incremental_review_pause_after: 10
    drafts: true
    base_branches: ["main", "master"]

  finishing_touches:
    docstrings:
      enabled: true
    unit_tests:
      enabled: true

  pre_merge_checks:
    docstrings:
      mode: "warning"
      threshold: 70
    title:
      mode: "error"
      requirements: "PR 标题应简洁描述变更目的，使用英文，不超过 72 个字符，格式为 type(scope): description"
    description:
      mode: "warning"
    issue_assessment:
      mode: "warning"
    custom_checks:
      - name: "No Hardcoded Secrets"
        mode: "error"
        instructions: >
          检查代码中是否存在硬编码的密钥、密码、API key、token 等敏感信息。
          如果发现任何疑似硬编码的密钥（包括但不限于：以 sk-、ak-、AKIA
          开头的字符串，或变量名包含 password、secret、key、token 且值为
          字面量字符串），则检查失败。
      - name: "No Sync IO in Async Context"
        mode: "warning"
        instructions: >
          检查异步函数中是否使用了同步 I/O 操作（如 fs.readFileSync、
          fs.writeFileSync 等）。在 async 函数内使用同步 I/O 会阻塞
          事件循环，应使用对应的异步版本。

  tools:
    eslint:
      enabled: true
    biome:
      enabled: true
    gitleaks:
      enabled: true
    trufflehog:
      enabled: true
    shellcheck:
      enabled: true
    hadolint:
      enabled: true
    markdownlint:
      enabled: true
    languagetool:
      enabled: true
      level: "picky"
    yamllint:
      enabled: true
    actionlint:
      enabled: true
    semgrep:
      enabled: true
    opengrep:
      enabled: true
    ast-grep:
      essentials: true
    github-checks:
      enabled: true
      timeout_ms: 120000

chat:
  auto_reply: true

knowledge_base:
  opt_out: false
  web_search:
    enabled: true
  learnings:
    scope: "auto"
  issues:
    scope: "auto"
  pull_requests:
    scope: "auto"

code_generation:
  docstrings:
    language: "zh-CN"
    path_instructions:
      - path: "src/**/*.js"
        instructions: "使用 JSDoc 格式生成文档字符串，包含 @param、@returns、@throws、@example 标签"
  unit_tests:
    path_instructions:
      - path: "src/**/*.js"
        instructions: "使用 Jest 框架生成单元测试，覆盖正常流程、边界情况和错误处理"
